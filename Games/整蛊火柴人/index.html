<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>整蛊火柴人</title>
    <meta name="keywords" content="静水深流,Flash游戏收藏站,在线小游戏,Flash游戏,Flash游戏汉化版,整蛊火柴人,整蛊火柴人汉化版">
    <link rel="stylesheet" href="/api/play/play.css">
    <link rel="stylesheet" href="/api/header.css">
    <script src="/api/ruffle/ruffle.js"></script>
    <script src="/api/play/zan.js"></script>
    <script type="text/javascript" src="/api/index/index-count.js"></script>
    <link rel="stylesheet" href="/api/icon/css/all.min.css">
    <link rel="icon" href="/api/icon/H.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ethaniel">
    <meta name="google-site-verification" content="mD2l3_aOmwjXLEvIAyB7bLGNGBnq7u88vPoK2oNuy3c" />
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());
        gtag('config', 'G-9C3EYEPPQ1');
    </script>
</head>

<body>
    <header>
        <h1>整蛊火柴人</h1>
    </header>
    <div class="main-content">
        <div class="game-container">
            <embed id="gameEmbed" src="/swf/整蛊火柴人/整蛊火柴人1.swf" width="100%" height="100%" />
        </div>
        <div class="text-container">
            <div class="switch-buttons">
                <button onclick="switchGame('0')">一代</button>
                <button onclick="switchGame('1')">二代</button>
            </div>
            <h2>如何游玩</h2>
            <p>鼠标控制，点击左侧的道具选项选择道具，然后尽情发挥吧！（右边上面的滑动条是调节绳子长度的，下面的是水位高度） <br> 你可以按上面的按钮切换1、2两代，推荐玩2代，更细腻的画风和更丰富的道具选择 <br> Explode是爆炸，按一次炸弹立即爆炸一个；Clear是清除，点击一键清屏</p>
            <p>你可以按上面的按钮切换不同版本</p>
        </div>
    </div>
    <div class="bottom-bar">
        <div class="bottom">
            <a href="/swf/整蛊火柴人/整蛊火柴人1.swf" download="一代.swf" class="bottomP">
                <svg width="20" height="20" class="icon">
                    <use xlink:href="/api/icon/icon.svg#DownloadSVG"></use>
                </svg>
                <span>下载一代</span>
            </a>
        </div>
        <div class="bottom">
            <a href="/swf/整蛊火柴人/整蛊火柴人2.swf" download="二代.swf" class="bottomP">
                <svg width="20" height="20" class="icon">
                    <use xlink:href="/api/icon/icon.svg#DownloadSVG"></use>
                </svg>
                <span>下载二代</span>
            </a>
        </div>
        <div class="bottom">
            <a href="../../Falsh播放器.exe" download="Falsh播放器.exe" class="bottomP">
                <svg width="20" height="20" class="icon">
                    <use xlink:href="/api/icon/icon.svg#DownloadSVG"></use>
                </svg>
                <span>Flash播放器</span>
            </a>
        </div>
        <div class="bottom">
            <a href="/" class="bottomP">
                <svg width="20" height="20" class="icon">
                    <use xlink:href="/api/icon/icon.svg#HomeSVG"></use>
                </svg>
                <span>返回主页</span>
            </a>
        </div>
        <div class="bottom">
            <svg width="20" height="20" class="icon">
                <use xlink:href="/api/icon/icon.svg#CopySVG"></use>
            </svg>
            <button class="bottomP copy-button" onclick="copyToClipboard()">复制网址</button>
        </div>
    </div>
    <div class="bottom-text"></div>
    <div id="twikoo"></div>
    <script>
        const gameFiles = [{
            "name": "一代",
            "path": "/swf/整蛊火柴人/整蛊火柴人1.swf"
        }, {
            "name": "二代",
            "path": "/swf/整蛊火柴人/整蛊火柴人2.swf"
        }];

        function switchGame(index) {
            var embed = document.getElementById('gameEmbed');
            if (gameFiles[index] && gameFiles[index].path) {
                embed.src = gameFiles[index].path;
            }
        }
    </script>
    <script src="/api/play/play-copy.js"></script>
    <script src="/api/play/play-bottom-text.js"></script>
    <script src="/api/play/play-twikoo.js"></script>
</body>

</html>
